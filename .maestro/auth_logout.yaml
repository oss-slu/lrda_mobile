appId: register.edu.slu.cs.oss.lrda
---
# Auth flow: logout from the app.
# Assumes we are already logged in and on the tabs screen.
# Logout lives on the profile page, reached via the avatar on the More tab.

- tapOn:
    id: "tab-more"
- extendedWaitUntil:
    visible:
      id: "profile-button"
    timeout: 10000
- tapOn:
    id: "profile-button"

- extendedWaitUntil:
    visible:
      id: "logout-button"
    timeout: 10000
- tapOn:
    id: "logout-button"

- extendedWaitUntil:
    visible: "Login"
    timeout: 10000
