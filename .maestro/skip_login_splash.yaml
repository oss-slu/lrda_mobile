appId: register.edu.slu.cs.oss.lrda
tags:
  - helper
---
# The login screen shows a "Where's Religion?" splash for 2 seconds.
# Tap to dismiss it, then wait for the login form to appear.
- runFlow:
    when:
      notVisible:
        id: "login-button"
    commands:
      - tapOn:
          point: "50%,50%"
      - waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "login-button"
    timeout: 10000
