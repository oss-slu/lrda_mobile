appId: register.edu.slu.cs.oss.lrda
env:
  # Overriding via `maestro test -e` is broken in Maestro 2.5.1 on iOS
  # (inputText types nothing); edit this default instead.
  TEST_EMAIL: "maestro-jul8@test.com"
---
# Auth flow: navigate to forgot password, submit email, verify alert.
# Self-sufficient: launches the app and logs out first if a session is active
# (forgot-password lives on the login screen).

- launchApp

- runFlow: skip_onboarding.yaml

- extendedWaitUntil:
    visible:
      id: "HomeScreen"
    timeout: 8000
    optional: true

- runFlow:
    when:
      visible:
        id: "HomeScreen"
    commands:
      - runFlow: auth_logout.yaml

- runFlow: skip_login_splash.yaml

- tapOn: "Forgot Password?"

- assertVisible: "Forgot Password"

- tapOn:
    text: "Email..."
- inputText: ${TEST_EMAIL}

- tapOn: "Send Reset Link"

- extendedWaitUntil:
    visible: "Success"
    timeout: 10000

- tapOn: "OK"

- assertVisible: "Login"
